---
# Defaults for the cpu_thermals_systemd role.
# Override these in your playbook vars, host_vars, or group_vars.

# Path to the installed cpu-thermals binary on the target host.
cpu_thermals_binary_path: /usr/local/bin/cpu-thermals

# Where the captured CSV lives.
cpu_thermals_log_dir: /var/log/cpu_thermals
cpu_thermals_log_file: cpu_thermals.csv

# Refresh interval passed to cpu-thermals (seconds, positional argument).
cpu_thermals_sample_interval: 2.0

# Service identity. Defaults to root for simplest sensors access; for a
# hardened deployment create a dedicated system user/group with read access
# to /sys/class/hwmon/* and write access to cpu_thermals_log_dir.
cpu_thermals_user: root
cpu_thermals_group: root

# systemd unit name (without the .service suffix).
cpu_thermals_service_name: cpu-thermals
cpu_thermals_service_state: started     # started | stopped | restarted
cpu_thermals_service_enabled: true
cpu_thermals_restart_sec: 5

# logrotate config (set _enabled to false if you have a different log
# rotation system or don't want one).
cpu_thermals_logrotate_enabled: true
cpu_thermals_logrotate_frequency: daily   # daily | weekly | monthly
cpu_thermals_logrotate_count: 30
